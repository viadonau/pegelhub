services:
  ma-connector:
    image: ${MA_CONNECTOR_IMAGE:?Set MA_CONNECTOR_IMAGE to a GHCR ma connector image tag}
    restart: unless-stopped
    extra_hosts:
      - "pegelhub-keycloak.test:${PEGELHUB_HOST_IP:?Set PEGELHUB_HOST_IP to the Core/Keycloak host LAN IP}"
    devices:
      - "/dev/piControl0:/dev/piControl0"
    volumes:
      - ./config:/app/config:ro
      - ./data:/app/data:ro
    environment:
      JAVA_TOOL_OPTIONS: "-DLOG_LEVEL=INFO"
