spring:
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI:http://pegelhub-keycloak.test:8082/realms/pegelhub}
  datasource:
    url: jdbc:postgresql://localhost:5444/pegelhub
    username: postgres
    password: postgres
  jpa:
    show-sql: true

management:
  server:
    port: 8081
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true

pegelhub:
  security:
    issuer-uri: ${KEYCLOAK_ISSUER_URI:http://pegelhub-keycloak.test:8082/realms/pegelhub}
  influx:
    url: ${INFLUX_URL:http://localhost:8111/}
    org: ${INFLUX_ORG:pegelhub}
    token: ${INFLUX_TOKEN:local-dev-influx-token-change-me-000000000000000000000000000000}
    data-bucket: ${INFLUX_DATA_BUCKET:pegelhub-data}
    telemetry-bucket: ${INFLUX_TELEMETRY_BUCKET:pegelhub-telemetry}
    latest-range: ${INFLUX_LATEST_RANGE:72h}
