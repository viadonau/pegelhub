name: Images

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  core:
    name: Core Image
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Build core image
        run: docker build core --tag pegelhub-core:ci

  connectors:
    name: Connector Images
    runs-on: ubuntu-latest
    timeout-minutes: 30

    strategy:
      fail-fast: false
      matrix:
        include:
          - connector: ftp-connector
            platform: linux/amd64
          - connector: icc-connector
            platform: linux/amd64
          - connector: iec-connector
            platform: linux/amd64
          - connector: ma-connector
            platform: linux/arm64/v8
          - connector: tstp-connector
            platform: linux/amd64

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Package connectors
        run: mvn -B -ntp -f connectors/pom.xml -DskipTests package

      - name: Build connector image
        run: docker buildx build --platform ${{ matrix.platform }} --load connectors/${{ matrix.connector }} --tag pegelhub-${{ matrix.connector }}:ci
