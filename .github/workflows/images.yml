name: Images

on:
  workflow_dispatch:
    inputs:
      push:
        description: Push images to GHCR
        required: true
        default: false
        type: boolean
  push:
    # TEMPORARY: remove this branches block after testing the image workflow on this PR branch.
    # Branch pushes publish ci-* and sha-* test images to GHCR.
    branches:
      - feature/PH-11-CD-pipeline
    tags:
      - 'v*'

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_OWNER: ${{ github.repository_owner }}
  SHOULD_PUSH: ${{ github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.push) }}

jobs:
  core:
    name: Core Image
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        if: ${{ env.SHOULD_PUSH == 'true' }}
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build core image
        uses: ./.github/actions/docker-image
        with:
          image: ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/pegelhub-core
          context: core
          platforms: linux/amd64,linux/arm64/v8
          push: ${{ env.SHOULD_PUSH }}

  connectors:
    name: Connector Images
    runs-on: ubuntu-latest
    timeout-minutes: 30

    strategy:
      fail-fast: false
      matrix:
        include:
          - connector: ftp-connector
            platform: linux/amd64,linux/arm64/v8
          - connector: icc-connector
            platform: linux/amd64,linux/arm64/v8
          - connector: iec-connector
            platform: linux/amd64,linux/arm64/v8
          - connector: ma-connector
            platform: linux/arm64/v8
          - connector: tstp-connector
            platform: linux/amd64,linux/arm64/v8

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up QEMU
        if: ${{ contains(matrix.platform, 'arm64') }}
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        if: ${{ env.SHOULD_PUSH == 'true' }}
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Package connectors
        run: mvn -B -ntp -f connectors/pom.xml -DskipTests package

      - name: Build connector image
        uses: ./.github/actions/docker-image
        with:
          image: ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/pegelhub-${{ matrix.connector }}
          context: connectors/${{ matrix.connector }}
          platforms: ${{ matrix.platform }}
          push: ${{ env.SHOULD_PUSH }}
