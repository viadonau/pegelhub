name: Images

on:
  workflow_dispatch:
    inputs:
      push:
        description: Push images to GHCR
        required: true
        default: false
        type: boolean
  push:
    # TEMPORARY: remove this branches block after testing the image workflow on this PR branch.
    # Branch pushes publish ci-* and sha-* test images to GHCR.
    branches:
      - feature/PH-11-CD-pipeline
    tags:
      - 'v*'

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_OWNER: ${{ github.repository_owner }}

jobs:
  core:
    name: Core Image
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        if: ${{ github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.push) }}
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/pegelhub-core
          flavor: latest=false
          tags: |
            type=raw,value=ci-${{ github.run_number }},enable=${{ github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/heads/') }}
            type=ref,event=tag
            type=sha,prefix=sha-,format=short

      - name: Build core image
        id: build
        uses: docker/build-push-action@v7
        with:
          context: core
          platforms: linux/amd64
          load: ${{ !(github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.push)) }}
          push: ${{ github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.push) }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Summarize published core image
        if: ${{ github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.push) }}
        env:
          IMAGE_DIGEST: ${{ steps.build.outputs.digest }}
          IMAGE_TAGS: ${{ steps.meta.outputs.tags }}
        run: |
          {
            echo "### Core image"
            echo "- Digest: \`${IMAGE_DIGEST}\`"
            echo "- Tags:"
            while IFS= read -r tag; do
              echo "  - \`${tag}\`"
            done <<< "$IMAGE_TAGS"
          } >> "$GITHUB_STEP_SUMMARY"

  connectors:
    name: Connector Images
    runs-on: ubuntu-latest
    timeout-minutes: 30

    strategy:
      fail-fast: false
      matrix:
        include:
          - connector: ftp-connector
            platform: linux/amd64
          - connector: icc-connector
            platform: linux/amd64
          - connector: iec-connector
            platform: linux/amd64
          - connector: ma-connector
            platform: linux/arm64/v8
          - connector: tstp-connector
            platform: linux/amd64

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        if: ${{ github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.push) }}
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Package connectors
        run: mvn -B -ntp -f connectors/pom.xml -DskipTests package

      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/pegelhub-${{ matrix.connector }}
          flavor: latest=false
          tags: |
            type=raw,value=ci-${{ github.run_number }},enable=${{ github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/heads/') }}
            type=ref,event=tag
            type=sha,prefix=sha-,format=short

      - name: Build connector image
        id: build
        uses: docker/build-push-action@v7
        with:
          context: connectors/${{ matrix.connector }}
          platforms: ${{ matrix.platform }}
          load: ${{ !(github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.push)) }}
          push: ${{ github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.push) }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Summarize published connector image
        if: ${{ github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.push) }}
        env:
          IMAGE_DIGEST: ${{ steps.build.outputs.digest }}
          IMAGE_TAGS: ${{ steps.meta.outputs.tags }}
        run: |
          {
            echo "### ${{ matrix.connector }} image"
            echo "- Digest: \`${IMAGE_DIGEST}\`"
            echo "- Tags:"
            while IFS= read -r tag; do
              echo "  - \`${tag}\`"
            done <<< "$IMAGE_TAGS"
          } >> "$GITHUB_STEP_SUMMARY"
