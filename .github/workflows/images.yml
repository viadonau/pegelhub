name: Images

on:
  workflow_dispatch:
    inputs:
      deploy_staging:
        description: Deploy the published images to staging after the build succeeds.
        required: true
        type: boolean
        default: true
  push:
    branches:
      - main
    tags:
      - 'v*'

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_OWNER: ${{ github.repository_owner }}

jobs:
  core:
    name: Core Image
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4
        with:
          cache-image: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build core image
        uses: ./.github/actions/docker-image
        with:
          image: ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/pegelhub-core
          context: core
          file: core/Dockerfile
          platforms: linux/amd64,linux/arm64/v8

  connectors:
    name: Connector Images
    runs-on: ubuntu-latest
    timeout-minutes: 30

    strategy:
      fail-fast: false
      matrix:
        include:
          - connector: ftp-connector
            platform: linux/amd64,linux/arm64/v8
          - connector: icc-connector
            platform: linux/amd64,linux/arm64/v8
          - connector: iec-connector
            platform: linux/amd64,linux/arm64/v8
          - connector: ma-connector
            platform: linux/arm64/v8
          - connector: tstp-connector
            platform: linux/amd64,linux/arm64/v8

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4
        with:
          cache-image: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build connector image
        uses: ./.github/actions/docker-image
        with:
          image: ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/pegelhub-${{ matrix.connector }}
          context: .
          file: connectors/${{ matrix.connector }}/Dockerfile
          platforms: ${{ matrix.platform }}

  deploy-staging:
    name: Deploy Staging
    runs-on: ubuntu-latest
    needs:
      - core
      - connectors
    if: ${{ startsWith(github.ref, 'refs/tags/v') || github.ref == 'refs/heads/main' || (github.event_name == 'workflow_dispatch' && inputs.deploy_staging) }}
    timeout-minutes: 15
    environment: staging
    permissions:
      contents: read
    concurrency:
      group: staging-deploy
      cancel-in-progress: false

    steps:
      - name: Resolve image tag
        id: image-tag
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            image_tag="${GITHUB_REF_NAME}"
          else
            image_tag="sha-${GITHUB_SHA::7}"
          fi

          echo "image_tag=${image_tag}" >> "$GITHUB_OUTPUT"
          echo "Deploying image tag ${image_tag} to staging."

      - name: Validate staging deploy config
        shell: bash
        env:
          STAGING_REPO_DIR: ${{ vars.STAGING_REPO_DIR }}
          STAGING_SSH_FINGERPRINT: ${{ secrets.STAGING_SSH_FINGERPRINT }}
          STAGING_SSH_HOST: ${{ vars.STAGING_SSH_HOST }}
          STAGING_SSH_PRIVATE_KEY: ${{ secrets.STAGING_SSH_PRIVATE_KEY }}
          STAGING_SSH_USER: ${{ vars.STAGING_SSH_USER }}
        run: |
          for required in STAGING_REPO_DIR STAGING_SSH_FINGERPRINT STAGING_SSH_HOST STAGING_SSH_PRIVATE_KEY STAGING_SSH_USER; do
            if [[ -z "${!required}" ]]; then
              echo "${required} is missing." >&2
              exit 1
            fi
          done

      - name: Run staging deploy
        uses: appleboy/ssh-action@v1
        env:
          IMAGE_TAG: ${{ steps.image-tag.outputs.image_tag }}
          DEPLOY_REF: ${{ github.ref_name }}
          STAGING_REPO_DIR: ${{ vars.STAGING_REPO_DIR }}
        with:
          host: ${{ vars.STAGING_SSH_HOST }}
          port: ${{ vars.STAGING_SSH_PORT || '22' }}
          username: ${{ vars.STAGING_SSH_USER }}
          key: ${{ secrets.STAGING_SSH_PRIVATE_KEY }}
          fingerprint: ${{ secrets.STAGING_SSH_FINGERPRINT }}
          command_timeout: 15m
          envs: STAGING_REPO_DIR,DEPLOY_REF,IMAGE_TAG
          script: |
            set -eu

            for required in STAGING_REPO_DIR DEPLOY_REF IMAGE_TAG; do
              eval "value=\${$required:-}"
              if [ -z "$value" ]; then
                echo "$required is missing." >&2
                exit 1
              fi
            done

            cd "$STAGING_REPO_DIR"

            if ! git diff --quiet || ! git diff --cached --quiet; then
              echo "Staging repository has uncommitted tracked changes. Refusing to deploy." >&2
              exit 1
            fi

            git fetch --prune --tags origin

            if git show-ref --verify --quiet "refs/remotes/origin/$DEPLOY_REF"; then
              git checkout --force -B "$DEPLOY_REF" "origin/$DEPLOY_REF"
            else
              git checkout --force "$DEPLOY_REF"
            fi

            deploy/staging/scripts/deploy.sh "$IMAGE_TAG"
