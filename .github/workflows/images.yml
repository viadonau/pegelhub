name: Images

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_OWNER: ${{ github.repository_owner }}

jobs:
  core:
    name: Core Image
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4
        with:
          cache-image: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build core image
        uses: ./.github/actions/docker-image
        with:
          image: ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/pegelhub-core
          context: core
          file: core/Dockerfile
          platforms: linux/amd64,linux/arm64/v8

  connectors:
    name: Connector Images
    runs-on: ubuntu-latest
    timeout-minutes: 30

    strategy:
      fail-fast: false
      matrix:
        include:
          - connector: ftp-connector
            platform: linux/amd64,linux/arm64/v8
          - connector: icc-connector
            platform: linux/amd64,linux/arm64/v8
          - connector: iec-connector
            platform: linux/amd64,linux/arm64/v8
          - connector: ma-connector
            platform: linux/arm64/v8
          - connector: tstp-connector
            platform: linux/amd64,linux/arm64/v8

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4
        with:
          cache-image: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build connector image
        uses: ./.github/actions/docker-image
        with:
          image: ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/pegelhub-${{ matrix.connector }}
          context: .
          file: connectors/${{ matrix.connector }}/Dockerfile
          platforms: ${{ matrix.platform }}
