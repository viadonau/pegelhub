spring:
  jpa:
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
  datasource:
    url: jdbc:postgresql://${DB_URI}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  application:
    name: core-app

server:
  address: 0.0.0.0
  port: 8080

pegelhub:
  influx:
    url: ${INFLUX_URL}
    org: ${INFLUX_ORG}
    token: ${INFLUX_TOKEN}
    data-bucket: ${INFLUX_DATA_BUCKET}
    telemetry-bucket: ${INFLUX_TELEMETRY_BUCKET}

management:
  server:
    port: 8081
  endpoints:
    web:
      exposure:
        include: "*"
